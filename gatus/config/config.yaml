endpoints:
  - name: Leantime
    url: "http://lks-oss-lb-1535611571.us-east-1.elb.amazonaws.com/"
    interval: 30s
    conditions:
      - "[STATUS] == 200"
      - "[RESPONSE_TIME] <= 500"
    alerts:
      - type: github
        failure-threshold: 3
        success-threshold: 5
        send-on-resolved: true
        description: "Server down :("