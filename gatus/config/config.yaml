# Source Config Example : https://gatus.io/docs/import-yaml-configuration

alerting:
  github:
    repository-url: "https://github.com/VirzaPixel/lks-gatus"
    token: "${GITHUB_TOKEN}"

endpoints:
  # Leantime App Url
  - name: Leantime App
    url: "http://lks-oss-lb-1535611571.us-east-1.elb.amazonaws.com/"
    interval: 30s
    conditions:
      - "[STATUS] == 200"
      - "[RESPONSE_TIME] < 300"
    alerts:
      - type: github
        failure-threshold: 3 
        success-threshold: 5 
        send-on-resolved: true
        Description: "Down wok"